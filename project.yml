name: SnapMath
options:
  bundleIdPrefix: com.kokicoder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ANTHROPIC_API_KEY: "$(ANTHROPIC_API_KEY)"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  SnapMath:
    type: application
    platform: iOS
    bundleId: com.kokicoder.snapmath
    sources:
      - path: ios_app
    info:
      path: ios_app/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "SnapMath needs camera access to photograph math problems."
        NSPhotoLibraryUsageDescription: "SnapMath can solve math problems from your photo library."
        UIUserInterfaceStyle: Dark
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    settings:
      base:
        INFOPLIST_FILE: ios_app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kokicoder.snapmath
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
